<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM API Bootcamp (xAI Grok)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0b0f;
      --surface: #12141a;
      --surface2: #1a1d26;
      --text: #e8eaef;
      --muted: #8b93a7;
      --border: #252a36;
      --accent: #3b82f6;
      --accent-dim: rgba(59, 130, 246, 0.12);
      --green: #22c55e;
      --green-dim: rgba(34, 197, 94, 0.12);
      --warn: #f59e0b;
      --warn-dim: rgba(245, 158, 11, 0.12);
      --red: #ef4444;
      --sidebar: 240px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    .app {
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-brand {
      padding: 0 18px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .sidebar-brand h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .sidebar-brand p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .credit-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 6px 10px;
      background: var(--green-dim);
      border: 1px solid rgba(34, 197, 94, 0.25);
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--green);
    }

    .module-nav { list-style: none; }

    .module-btn {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      width: 100%;
      padding: 12px 18px;
      border: none;
      background: transparent;
      color: var(--muted);
      text-align: left;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.35;
      transition: background 0.15s, color 0.15s;
    }

    .module-btn:hover { background: var(--surface2); color: var(--text); }
    .module-btn.active { background: var(--accent-dim); color: var(--text); border-right: 2px solid var(--accent); }

    .module-num {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .module-btn.active .module-num { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .module-btn.done .module-num { background: var(--green-dim); border-color: var(--green); color: var(--green); }

    .sidebar-tools {
      padding: 16px 18px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .tool-link {
      display: block;
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      text-align: left;
    }

    .tool-link:hover { color: var(--text); border-color: #334155; }

    .main {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 11, 15, 0.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .lesson-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .lesson-meta strong { color: var(--text); font-weight: 500; }

    .nav-controls { display: flex; gap: 8px; align-items: center; }

    .nav-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
    }

    .nav-btn:hover { background: var(--surface2); }
    .nav-btn:disabled { opacity: 0.35; cursor: default; }
    .nav-btn.primary { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .progress-bar {
      height: 3px;
      background: var(--border);
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.3s ease;
    }

    .content {
      flex: 1;
      padding: 32px 32px 48px;
      max-width: 820px;
    }

    .card { display: none; }
    .card.active { display: block; animation: fadeIn 0.25s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    h2 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    h3 {
      font-size: 17px;
      font-weight: 600;
      margin: 24px 0 10px;
    }

    p { margin-bottom: 14px; color: var(--text); }
    p.lead { font-size: 17px; color: var(--muted); line-height: 1.5; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      margin: 16px 0;
    }

    .panel.warn { border-color: rgba(245, 158, 11, 0.35); background: var(--warn-dim); }
    .panel.green { border-color: rgba(34, 197, 94, 0.35); background: var(--green-dim); }

    .panel-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin: 12px 0;
    }

    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    tr:last-child td { border-bottom: none; }

    pre, code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }

    pre {
      background: #08090d;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      overflow-x: auto;
      margin: 14px 0;
      line-height: 1.5;
    }

    code {
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    pre code { background: none; padding: 0; }

    .flow {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .flow-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      min-width: 120px;
      text-align: center;
    }

    .flow-box strong { display: block; font-size: 13px; margin-bottom: 4px; }
    .flow-box span { font-size: 12px; color: var(--muted); }
    .flow-arrow { color: var(--muted); font-size: 18px; }

    .console-mock {
      background: #08090d;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin: 16px 0;
      font-size: 13px;
    }

    .console-header {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
    }

    .console-body { padding: 16px; }

    .console-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .console-row:last-child { border-bottom: none; }
    .console-label { color: var(--muted); }
    .console-value { font-weight: 500; }
    .console-value.money { color: var(--green); }

    .product-grid {
      display: grid;
      gap: 12px;
      margin: 16px 0;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
    }

    .product-card h4 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tag.new { background: var(--accent-dim); color: var(--accent); }
    .tag.api { background: var(--green-dim); color: var(--green); }

    .product-card p { font-size: 14px; color: var(--muted); margin: 0; }
    .product-card .uses { margin-top: 10px; font-size: 13px; color: var(--text); }

    ul, ol { margin: 12px 0 12px 20px; }
    li { margin-bottom: 8px; color: var(--muted); font-size: 14px; }
    li strong { color: var(--text); }

    .checklist { list-style: none; margin-left: 0; }
    .checklist li {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .checklist li:last-child { border-bottom: none; }

    .check-box {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-radius: 4px;
      flex-shrink: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      font-size: 11px;
      color: var(--green);
    }

    .check-box.checked { background: var(--green-dim); border-color: var(--green); }

    .calc {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .calc label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .calc input, .calc select {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
    }

    .calc-result {
      grid-column: 1 / -1;
      padding: 14px;
      background: var(--bg);
      border-radius: 8px;
      font-size: 14px;
    }

    .calc-result strong { color: var(--green); font-size: 18px; }

    .decision-tree {
      margin: 16px 0;
    }

    .dt-q {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      cursor: pointer;
    }

    .dt-q:hover { border-color: var(--accent); }
    .dt-q .q { font-weight: 500; font-size: 14px; }
    .dt-q .a {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 14px;
      color: var(--muted);
    }

    .dt-q.open .a { display: block; }

    .trouble {
      border-left: 3px solid var(--warn);
      padding-left: 14px;
      margin: 14px 0;
    }

    .trouble h4 { font-size: 14px; margin-bottom: 4px; }
    .trouble p { font-size: 13px; color: var(--muted); margin: 0; }

    .mark-done {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* Print one-pager */
    @media print {
      .sidebar, .top-bar, .mark-done, .nav-controls { display: none !important; }
      .app { display: block; }
      .content { max-width: 100%; padding: 0; }
      .card { display: block !important; page-break-inside: avoid; }
      body { background: white; color: black; }
    }

    @media (max-width: 768px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; }
      .content { padding: 20px 16px; }
      .calc { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h1>LLM API Bootcamp</h1>
        <p>Theory-first. ~2 hours.</p>
        <div class="credit-pill">Prepaid API credits (example: $50)</div>
      </div>
      <ul class="module-nav" id="module-nav"></ul>
      <div class="sidebar-tools">
        <button class="tool-link" id="btn-print">Print one-pager</button>
        <button class="tool-link" id="btn-reset">Reset progress</button>
        <a class="tool-link" href="https://console.x.ai" target="_blank" rel="noopener">Open xAI Console ↗</a>
        <a class="tool-link" href="https://docs.x.ai" target="_blank" rel="noopener">API docs ↗</a>
      </div>
    </aside>

    <div class="main">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <header class="top-bar">
        <div class="lesson-meta" id="lesson-meta">Module 1 · Card 1</div>
        <div class="nav-controls">
          <button class="nav-btn" id="btn-prev" type="button">← Back</button>
          <span class="lesson-meta" id="card-counter">…</span>
          <button class="nav-btn primary" id="btn-next" type="button">Next →</button>
        </div>
      </header>

      <div class="content" id="content"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'llm-api-bootcamp-v1';

    const MODULES = [
      {
        id: 'what-is-api',
        title: 'What an API actually is',
        cards: [
          {
            eyebrow: 'Module 1 · Foundation',
            title: 'The one-sentence definition',
            html: `
              <p class="lead">An API is a <strong>remote service your software can call</strong> — with a fixed format for questions and answers — so a program can get work done without a human clicking buttons.</p>
              <p>Not a website. Not a chat window. A <strong>machine contract</strong>: send structured data in, get structured data out.</p>
              <div class="flow">
                <div class="flow-box"><strong>Your code</strong><span>script, bot, app</span></div>
                <span class="flow-arrow">→</span>
                <div class="flow-box"><strong>HTTP request</strong><span>JSON + API key</span></div>
                <span class="flow-arrow">→</span>
                <div class="flow-box"><strong>xAI servers</strong><span>Grok runs here</span></div>
                <span class="flow-arrow">→</span>
                <div class="flow-box"><strong>HTTP response</strong><span>JSON back</span></div>
              </div>
              <div class="panel">
                <div class="panel-title">Analogy (accurate enough)</div>
                <p style="margin:0">Restaurant kitchen. You don't walk into the kitchen. You write an order on a standard form (request). The kitchen produces food (response). The menu + order form = the API specification. The waiter = HTTP.</p>
              </div>
            `
          },
          {
            eyebrow: 'Module 1 · Foundation',
            title: 'API vs using Grok in a browser',
            html: `
              <table>
                <tr><th></th><th>Browser (grok.com, Grok app)</th><th>API (your key + code)</th></tr>
                <tr><td>Who talks to Grok</td><td>You, typing</td><td>Your program, automatically</td></tr>
                <tr><td>When it runs</td><td>When you're there</td><td>24/7 — bot, cron job, app button</td></tr>
                <tr><td>What you pay</td><td>Subscription (if any)</td><td>Your API credits (example balance)</td></tr>
                <tr><td>Output goes to</td><td>Chat window</td><td>Wherever your code sends it (Discord, file, speaker)</td></tr>
                <tr><td>Same brain?</td><td colspan="2">Same models. Different door into the building.</td></tr>
              </table>
              <div class="panel warn">
                <div class="panel-title">When you do NOT need the API</div>
                <p style="margin:0">One-off questions, brainstorming, editing a paragraph, exploring an idea. Use the browser. Cheaper mentally, zero integration work.</p>
              </div>
              <div class="panel green">
                <div class="panel-title">When you DO need the API</div>
                <p style="margin:0">Something must run without you: a Discord bot, an app button for a family member, batch-processing 40 story chapters, generating images from a script, voice that plays when a file lands in a folder.</p>
              </div>
            `
          },
          {
            eyebrow: 'Module 1 · Foundation',
            title: 'What you already did (mapped to API concepts)',
            html: `
              <p class="lead">You've touched API territory without necessarily knowing the vocabulary.</p>
              <div class="product-grid">
                <div class="product-card">
                  <h4>Cloned your voice</h4>
                  <p>That used a <strong>Voice API</strong> capability — text in, audio out, with a voice profile. Someone else's servers rendered audio from your text. That's an API call whether you clicked a button or ran a script.</p>
                </div>
                <div class="product-card">
                  <h4>Built a client app for a non-technical user</h4>
                  <p>That app is a <strong>client</strong>. Somewhere in the chain it either calls xAI directly (API key in the app) or calls your own backend that calls xAI. The user sees buttons; under the hood it's requests and responses.</p>
                </div>
                <div class="product-card">
                  <h4>Grok Build / Cursor</h4>
                  <p>The IDE agent uses an API key (yours or bundled) to send your prompts to a coding model (<code>grok-build-0.1</code>). You're already a consumer of API infrastructure — you just didn't see the JSON.</p>
                </div>
              </div>
              <p>The bootcamp makes the hidden layer visible: <strong>what gets sent, what comes back, what it costs.</strong></p>
            `
          },
          {
            eyebrow: 'Module 1 · Checklist',
            title: 'Module 1 checklist',
            html: `
              <ul class="checklist" data-checklist="m1">
                <li><div class="check-box"></div><span>I can explain API in one sentence: program sends structured request, gets structured response</span></li>
                <li><div class="check-box"></div><span>I know browser Grok vs API is same models, different access path</span></li>
                <li><div class="check-box"></div><span>I can name one thing I did (voice clone, app) and which API category it used</span></li>
              </ul>
            `
          }
        ]
      },
      {
        id: 'console-map',
        title: 'Your xAI console decoded',
        cards: [
          {
            eyebrow: 'Module 2 · Console',
            title: 'What you see after login',
            html: `
              <p class="lead">Screen description — match this to <a href="https://console.x.ai" target="_blank" rel="noopener">console.x.ai</a>:</p>
              <div class="console-mock">
                <div class="console-header">Welcome, [your account] · xAI Console</div>
                <div class="console-body">
                  <div class="console-row"><span class="console-label">Create API key</span><span class="console-value">Done ✓</span></div>
                  <div class="console-row"><span class="console-label">Enable auto top up</span><span class="console-value">Your choice — see Module 4</span></div>
                  <div class="console-row"><span class="console-label">Credits remaining</span><span class="console-value money">$50</span></div>
                  <div class="console-row"><span class="console-label">Credits usage</span><span class="console-value">$0.00</span></div>
                  <div class="console-row"><span class="console-label">Tokens</span><span class="console-value">0</span></div>
                  <div class="console-row"><span class="console-label">Requests</span><span class="console-value">0</span></div>
                </div>
              </div>
              <p><strong>Credits remaining</strong> = prepaid balance. Every API call deducts from this.</p>
              <p><strong>Tokens</strong> = units of text the model reads/writes. Usage dashboard aggregates them.</p>
              <p><strong>Requests</strong> = number of API calls. One Discord message = one request (roughly).</p>
              <p><strong>$0.00 usage with $50 sitting there</strong> = key exists, nothing has called the API yet. Grok Build in the IDE may use separate billing — check which key powers what.</p>
            `
          },
          {
            eyebrow: 'Module 2 · Products',
            title: 'The four products on your dashboard',
            html: `
              <div class="product-grid">
                <div class="product-card">
                  <h4>Grok Build 0.1 <span class="tag new">New</span></h4>
                  <p>Coding/agent model. Built for multi-step engineering tasks in IDEs and agents.</p>
                  <div class="uses"><strong>Use when:</strong> Grok Build, Cursor, automated code edits, workflow agents.<br><strong>Endpoint:</strong> Same API base, model name <code>grok-build-0.1</code>.<br><strong>Cost:</strong> ~$1.00 / 1M input tokens, $2.00 / 1M output.</div>
                </div>
                <div class="product-card">
                  <h4>Grok 4.3 — Chat API <span class="tag api">Core</span></h4>
                  <p>Text generation, multi-turn chat, tool/function calling.</p>
                  <div class="uses"><strong>Use when:</strong> Bots, Q&A, story generation, summarization, anything text.<br><strong>Endpoint:</strong> <code>POST /v1/responses</code> or chat completions.<br><strong>Cost:</strong> ~$1.25 / 1M input, $2.50 / 1M output tokens.</div>
                </div>
                <div class="product-card">
                  <h4>Voice Agents <span class="tag new">New</span></h4>
                  <p>Real-time voice: listen, think, speak. Can tie to phone numbers.</p>
                  <div class="uses"><strong>Use when:</strong> Phone agent, live voice conversation, duplex audio.<br><strong>Cost:</strong> Realtime ~$0.05/min ($3/hr). TTS ~$15 / 1M characters.</div>
                </div>
                <div class="product-card">
                  <h4>Imagine API</h4>
                  <p>Image and video generation from text (and image-to-video).</p>
                  <div class="uses"><strong>Use when:</strong> Thumbnails, storyboards, visual assets.<br><strong>Cost:</strong> Images $0.02–0.05 each. Video $0.05–0.08 / second.</div>
                </div>
              </div>
              <p>These are not separate accounts. <strong>One credit pool.</strong> Voice marathon burns it faster than text homework.</p>
            `
          },
          {
            eyebrow: 'Module 2 · Console',
            title: "API key — what it is and isn't",
            html: `
              <p class="lead">Your API key is a <strong>password that programs use</strong>, not you.</p>
              <ul>
                <li><strong>Format:</strong> Long string, sent as <code>Authorization: Bearer YOUR_KEY</code> on every request.</li>
                <li><strong>Scope:</strong> Charges your team's credits. Anyone with the key can spend your $50.</li>
                <li><strong>Not</strong> your login password. Not shown in chat UIs. Lives in env vars, config files, or app secrets.</li>

    let flatCards = [];
    let currentIndex = 0;
    let progress = loadProgress();

    function init() {
      flatCards = [];
      MODULES.forEach((mod, mi) => {
        mod.cards.forEach((card, ci) => {
          flatCards.push({ ...card, moduleIndex: mi, cardIndex: ci, moduleId: mod.id, moduleTitle: mod.title });
        });
      });

      const nav = document.getElementById('module-nav');
      nav.innerHTML = MODULES.map((m, i) => `
        <li>
          <button class="module-btn" type="button" data-module="${i}">
            <span class="module-num">${i + 1}</span>
            <span>${m.title}</span>
          </button>
        </li>
      `).join('');

      nav.addEventListener('click', e => {
        const btn = e.target.closest('.module-btn');
        if (!btn) return;
        jumpToModule(parseInt(btn.dataset.module, 10));
      });

      const content = document.getElementById('content');
      content.innerHTML = flatCards.map((c, i) => `
        <article class="card" data-index="${i}" id="card-${i}">
          <div class="eyebrow">${c.eyebrow}</div>
          <h2>${c.title}</h2>
          ${c.html}
          <div class="mark-done">
            <button class="nav-btn primary mark-done-btn" type="button" data-module="${c.moduleIndex}">Mark module ${c.moduleIndex + 1} understood →</button>
          </div>
        </article>
      `).join('');

      content.addEventListener('click', e => {
        if (e.target.classList.contains('check-box')) toggleCheck(e.target);
        if (e.target.classList.contains('mark-done-btn')) {
          markModuleProgress(parseInt(e.target.dataset.module, 10));
        }
        const dtq = e.target.closest('.dt-q');
        if (dtq) dtq.classList.toggle('open');
      });

      content.addEventListener('change', e => {
        if (e.target.id === 'calc-type') runCalc();
      });
      content.addEventListener('input', e => {
        if (['calc-amount', 'calc-size', 'calc-days'].includes(e.target.id)) runCalc();
      });

      document.getElementById('btn-prev').addEventListener('click', prevCard);
      document.getElementById('btn-next').addEventListener('click', nextCard);
      document.getElementById('btn-print').addEventListener('click', openOnePager);
      document.getElementById('btn-reset').addEventListener('click', resetProgress);

      restoreChecklists();
      const start = Math.min(progress.lastIndex || 0, flatCards.length - 1);
      showCard(start);
      runCalc();
    }

    function loadProgress() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { lastIndex: 0, modulesDone: [], checks: {} };
      } catch {
        return { lastIndex: 0, modulesDone: [], checks: {} };
      }
    }

    function saveProgress() {
      progress.lastIndex = currentIndex;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
      updateModuleUI();
      updateProgressBar();
    }

    function showCard(n) {
      if (n < 0 || n >= flatCards.length) return;
      currentIndex = n;
      document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
      document.getElementById(`card-${n}`).classList.add('active');

      const c = flatCards[n];
      document.getElementById('lesson-meta').innerHTML = `<strong>${c.moduleTitle}</strong> · ${c.title}`;
      document.getElementById('card-counter').textContent = `${n + 1} / ${flatCards.length}`;
      document.getElementById('btn-prev').disabled = n === 0;
      document.getElementById('btn-next').disabled = n === flatCards.length - 1;

      document.querySelectorAll('.module-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.module) === c.moduleIndex);
      });

      saveProgress();
      window.scrollTo(0, 0);
    }

    function nextCard() { showCard(currentIndex + 1); }
    function prevCard() { showCard(currentIndex - 1); }

    function jumpToModule(mi) {
      const idx = flatCards.findIndex(c => c.moduleIndex === mi);
      if (idx >= 0) showCard(idx);
    }

    function markModuleProgress(mi) {
      if (!progress.modulesDone.includes(mi)) progress.modulesDone.push(mi);
      saveProgress();
      const nextMod = MODULES[mi + 1];
      if (nextMod) jumpToModule(mi + 1);
      else nextCard();
    }

    function updateModuleUI() {
      document.querySelectorAll('.module-btn').forEach(btn => {
        const mi = parseInt(btn.dataset.module);
        btn.classList.toggle('done', progress.modulesDone.includes(mi));
      });
    }

    function updateProgressBar() {
      const pct = ((currentIndex + 1) / flatCards.length) * 100;
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    function toggleCheck(el) {
      el.classList.toggle('checked');
      el.textContent = el.classList.contains('checked') ? '✓' : '';
      const list = el.closest('[data-checklist]');
      if (list) {
        const id = list.dataset.checklist;
        progress.checks[id] = [...list.querySelectorAll('.check-box')].map(b => b.classList.contains('checked'));
        saveProgress();
      }
    }

    function restoreChecklists() {
      document.querySelectorAll('[data-checklist]').forEach(list => {
        const id = list.dataset.checklist;
        const states = progress.checks[id] || [];
        list.querySelectorAll('.check-box').forEach((box, i) => {
          if (states[i]) {
            box.classList.add('checked');
            box.textContent = '✓';
          }
        });
      });
    }

    function resetProgress() {
      if (confirm('Clear all progress and checklist ticks?')) {
        localStorage.removeItem(STORAGE_KEY);
        progress = { lastIndex: 0, modulesDone: [], checks: {} };
        document.querySelectorAll('.check-box').forEach(b => { b.classList.remove('checked'); b.textContent = ''; });
        showCard(0);
      }
    }

    function openOnePager() {
      const idx = flatCards.findIndex(c => c.title === 'One-pager (print this)');
      if (idx >= 0) showCard(idx);
      setTimeout(() => window.print(), 300);
    }

    function runCalc() {
      const typeEl = document.getElementById('calc-type');
      const result = document.getElementById('calc-result');
      if (!typeEl || !result) return;

      const type = typeEl.value;
      const amount = parseFloat(document.getElementById('calc-amount').value) || 0;
      const size = parseFloat(document.getElementById('calc-size').value) || 0;
      const days = parseFloat(document.getElementById('calc-days').value) || 30;

      const unitLabel = document.getElementById('calc-unit-label');
      const sizeLabel = document.getElementById('calc-size-label');

      let costPerUnit = 0;
      let desc = '';

      switch (type) {
        case 'chat': {
          unitLabel.textContent = 'Requests per day';
          sizeLabel.textContent = 'Total words (in + out) per request';
          sizeLabel.parentElement.style.display = '';
          const tokens = size * 1.33;
          const inputRatio = 0.4;
          costPerUnit = ((tokens * inputRatio) / 1e6 * 1.25) + ((tokens * (1 - inputRatio)) / 1e6 * 2.5);
          desc = 'Grok 4.3 text estimate';
          break;
        }
        case 'code': {
          unitLabel.textContent = 'Requests per day';
          sizeLabel.textContent = 'Total words (in + out) per request';
          sizeLabel.parentElement.style.display = '';
          const tokens = size * 1.33;
          const inputRatio = 0.5;
          costPerUnit = ((tokens * inputRatio) / 1e6 * 1.0) + ((tokens * (1 - inputRatio)) / 1e6 * 2.0);
          desc = 'Grok Build estimate';
          break;
        }
        case 'image': {
          unitLabel.textContent = 'Images per day';
          sizeLabel.parentElement.style.display = 'none';
          costPerUnit = 0.03;
          desc = 'Imagine image (~$0.03 avg)';
          break;
        }
        case 'tts': {
          unitLabel.textContent = 'Narration jobs per day';
          sizeLabel.textContent = 'Characters per job';
          sizeLabel.parentElement.style.display = '';
          costPerUnit = (size / 1e6) * 15;
          desc = 'TTS at $15 / 1M chars';
          break;
        }
        case 'voice': {
          unitLabel.textContent = 'Minutes of realtime per day';
          sizeLabel.parentElement.style.display = 'none';
          costPerUnit = 0.05;
          desc = 'Realtime voice at $0.05/min';
          break;
        }
      }

      const daily = amount * costPerUnit;
      const monthly = daily * days;
      const runway = monthly > 0 ? (50 / monthly) : Infinity;

      result.innerHTML = `
        <div>${desc}</div>
        <div style="margin-top:8px">Daily: <strong>$${daily.toFixed(3)}</strong> · Monthly (${days}d): <strong>$${monthly.toFixed(2)}</strong></div>
        <div style="margin-top:6px;color:var(--muted)">$50 runway at this rate: <strong style="color:var(--text)">${runway === Infinity ? '—' : runway.toFixed(1) + ' months'}</strong></div>
      `;
    }

    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      if (e.key === 'ArrowRight') nextCard();
      if (e.key === 'ArrowLeft') prevCard();
    });

    init();
  </script>
</body>
</html>
